[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[functions."claude"]
  timeout = 26

[functions."elevenlabs"]
  timeout = 26

[functions."send-email"]
  timeout = 10
